name: Upstream Sync

on:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:  # Allow manual triggering
  push:
    # Trigger when upstream.yaml or workflow file is updated
    paths:
      - 'upstream.yaml'
      - '.github/workflows/upstream-sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read upstream.yaml
        id: upstream
        run: |
          if [[ ! -f upstream.yaml ]]; then
            echo "Error: upstream.yaml not found"
            exit 1
          fi
          echo "repo=$(yq eval '.upstream.repo' upstream.yaml)" >> $GITHUB_OUTPUT
          echo "branch=$(yq eval '.upstream.branch' upstream.yaml)" >> $GITHUB_OUTPUT
          echo "commit=$(yq eval '.upstream.commit' upstream.yaml)" >> $GITHUB_OUTPUT

      - name: Check if initial sync needed
        id: initial_check
        run: |
          if [[ ! -d rtl ]] && [[ ! -f LICENSE ]]; then
            echo "needs_initial_sync=true" >> $GITHUB_OUTPUT
            echo "Repository has no synced content, performing initial sync..."
          else
            echo "needs_initial_sync=false" >> $GITHUB_OUTPUT
            echo "Repository already has content, checking for upstream updates..."
          fi

      - name: Clone upstream and check for updates
        id: check
        if: steps.initial_check.outputs.needs_initial_sync != 'true'
        run: |
          UPSTREAM_REPO="${{ steps.upstream.outputs.repo }}"
          UPSTREAM_BRANCH="${{ steps.upstream.outputs.branch }}"
          CURRENT_COMMIT="${{ steps.upstream.outputs.commit }}"

          rm -rf /tmp/upstream
          git clone --quiet "$UPSTREAM_REPO" /tmp/upstream
          cd /tmp/upstream
          git checkout "$UPSTREAM_BRANCH" --quiet
          LATEST_COMMIT=$(git rev-parse HEAD)

          echo "current=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_COMMIT" >> $GITHUB_OUTPUT

          if [[ "$CURRENT_COMMIT" == "$LATEST_COMMIT" ]]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Clone upstream for initial sync
        id: initial_clone
        if: steps.initial_check.outputs.needs_initial_sync == 'true'
        run: |
          UPSTREAM_REPO="${{ steps.upstream.outputs.repo }}"
          TARGET_COMMIT="${{ steps.upstream.outputs.commit }}"

          rm -rf /tmp/upstream
          git clone --quiet "$UPSTREAM_REPO" /tmp/upstream
          cd /tmp/upstream
          git checkout "$TARGET_COMMIT" --quiet
          echo "Cloned upstream at commit $TARGET_COMMIT for initial sync"

      - name: Sync upstream files
        if: steps.check.outputs.has_changes == 'true' || steps.initial_check.outputs.needs_initial_sync == 'true'
        run: |
          if [[ "${{ steps.initial_check.outputs.needs_initial_sync }}" == "true" ]]; then
            TARGET_COMMIT="${{ steps.upstream.outputs.commit }}"
            echo "Initial sync at commit: $TARGET_COMMIT"
          else
            TARGET_COMMIT="${{ steps.check.outputs.latest }}"
            echo "Update sync to commit: $TARGET_COMMIT"
            cd /tmp/upstream
            git checkout "$TARGET_COMMIT" --quiet
          fi

          cd "$GITHUB_WORKSPACE"

          # Process RTL imports — clean target first to remove any moved/deleted files
          RTL_COUNT=$(yq eval '.import.rtl | length' upstream.yaml)
          for ((i=0; i<RTL_COUNT; i++)); do
            UPSTREAM_PATH=$(yq eval ".import.rtl[$i].path" upstream.yaml)
            LOCAL_PATH=$(yq eval ".import.rtl[$i].map_to" upstream.yaml)
            echo "Syncing RTL: $UPSTREAM_PATH -> $LOCAL_PATH"
            rm -rf "$LOCAL_PATH"
            mkdir -p "$LOCAL_PATH"
            cp -r "/tmp/upstream/$UPSTREAM_PATH/." "$LOCAL_PATH/"
          done

          # Process examples imports — clean target first
          if yq eval '.import.examples' upstream.yaml 2>/dev/null | grep -q "path"; then
            EXAMPLES_COUNT=$(yq eval '.import.examples | length' upstream.yaml)
            for ((i=0; i<EXAMPLES_COUNT; i++)); do
              UPSTREAM_PATH=$(yq eval ".import.examples[$i].path" upstream.yaml)
              LOCAL_PATH=$(yq eval ".import.examples[$i].map_to" upstream.yaml)
              echo "Syncing examples: $UPSTREAM_PATH -> $LOCAL_PATH"
              rm -rf "$LOCAL_PATH"
              mkdir -p "$LOCAL_PATH"
              cp -r "/tmp/upstream/$UPSTREAM_PATH/." "$LOCAL_PATH/"
            done
          fi

          # Process constraints imports — clean target first
          if yq eval '.import.constraints' upstream.yaml 2>/dev/null | grep -q "path"; then
            CONSTRAINTS_COUNT=$(yq eval '.import.constraints | length' upstream.yaml)
            for ((i=0; i<CONSTRAINTS_COUNT; i++)); do
              UPSTREAM_PATH=$(yq eval ".import.constraints[$i].path" upstream.yaml)
              LOCAL_PATH=$(yq eval ".import.constraints[$i].map_to" upstream.yaml)
              echo "Syncing constraints: $UPSTREAM_PATH -> $LOCAL_PATH"
              rm -rf "$LOCAL_PATH"
              mkdir -p "$LOCAL_PATH"
              cp -r "/tmp/upstream/$UPSTREAM_PATH/." "$LOCAL_PATH/"
            done
          fi

          # Process metadata imports (single files, e.g. vyges-metadata.json)
          if yq eval '.import.metadata' upstream.yaml 2>/dev/null | grep -q "path"; then
            META_COUNT=$(yq eval '.import.metadata | length' upstream.yaml)
            for ((i=0; i<META_COUNT; i++)); do
              UPSTREAM_PATH=$(yq eval ".import.metadata[$i].path" upstream.yaml)
              LOCAL_PATH=$(yq eval ".import.metadata[$i].map_to" upstream.yaml)
              echo "Syncing metadata: $UPSTREAM_PATH -> $LOCAL_PATH"
              cp "/tmp/upstream/$UPSTREAM_PATH" "$LOCAL_PATH"
            done
          fi

          # Process patches imports
          if yq eval '.import.patches' upstream.yaml 2>/dev/null | grep -q "path"; then
            PATCHES_COUNT=$(yq eval '.import.patches | length' upstream.yaml)
            for ((i=0; i<PATCHES_COUNT; i++)); do
              UPSTREAM_PATH=$(yq eval ".import.patches[$i].path" upstream.yaml)
              LOCAL_PATH=$(yq eval ".import.patches[$i].map_to" upstream.yaml)
              echo "Syncing patches: $UPSTREAM_PATH -> $LOCAL_PATH"
              mkdir -p "$(dirname "$LOCAL_PATH")"
              cp -r "/tmp/upstream/$UPSTREAM_PATH" "$LOCAL_PATH" 2>/dev/null || true
            done
          fi

          # Process license imports
          if yq eval '.import.license' upstream.yaml 2>/dev/null | grep -q "path"; then
            LICENSE_COUNT=$(yq eval '.import.license | length' upstream.yaml)
            for ((i=0; i<LICENSE_COUNT; i++)); do
              UPSTREAM_PATH=$(yq eval ".import.license[$i].path" upstream.yaml)
              echo "Syncing license: $UPSTREAM_PATH"
              cp "/tmp/upstream/$UPSTREAM_PATH" .
            done
          fi

          # Process readme imports
          if yq eval '.import.readme' upstream.yaml 2>/dev/null | grep -q "path"; then
            README_COUNT=$(yq eval '.import.readme | length' upstream.yaml)
            for ((i=0; i<README_COUNT; i++)); do
              UPSTREAM_PATH=$(yq eval ".import.readme[$i].path" upstream.yaml)
              echo "Syncing README: $UPSTREAM_PATH"
              cp "/tmp/upstream/$UPSTREAM_PATH" .
            done
          fi

          # Update upstream.yaml commit field (update sync only; initial sync keeps the pinned commit)
          if [[ "${{ steps.initial_check.outputs.needs_initial_sync }}" != "true" ]]; then
            NEW_COMMIT="${{ steps.check.outputs.latest }}"
            yq eval ".upstream.commit = \"$NEW_COMMIT\"" -i upstream.yaml
            echo "Updated upstream.yaml commit to $NEW_COMMIT"
          fi

          echo "Sync complete at upstream commit $TARGET_COMMIT"

      - name: Check if metadata needs generation
        id: metadata_check
        run: |
          # If metadata is in the import section it was already synced above — no generation needed
          if yq eval '.import.metadata' upstream.yaml 2>/dev/null | grep -q "path"; then
            echo "imported=true" >> $GITHUB_OUTPUT
            echo "vyges-metadata.json is imported from upstream — skipping generation"
          elif [[ -f vyges-metadata.json ]]; then
            echo "imported=false" >> $GITHUB_OUTPUT
            echo "vyges-metadata.json already exists"
          else
            echo "imported=false" >> $GITHUB_OUTPUT
            echo "vyges-metadata.json not present and not imported — will generate skeleton"
          fi

      - name: Generate vyges-metadata.json skeleton (fallback — only when not imported)
        if: |
          steps.metadata_check.outputs.imported != 'true' &&
          !hashFiles('vyges-metadata.json') &&
          (steps.check.outputs.has_changes == 'true' || steps.initial_check.outputs.needs_initial_sync == 'true')
        run: |
          REPO_NAME="${{ github.repository }}"
          IP_NAME=$(echo "$REPO_NAME" | cut -d'/' -f2)
          UPSTREAM_REPO=$(yq eval '.upstream.repo' upstream.yaml)
          UPSTREAM_COMMIT=$(yq eval '.upstream.commit' upstream.yaml)
          LICENSE_SPDX=$(yq eval '.license.spdx // "Apache-2.0"' upstream.yaml)

          VERSION="1.0.0"
          for UPSTREAM_DIR in /tmp/upstream /tmp/upstream-check; do
            if [[ -d "$UPSTREAM_DIR" ]]; then
              cd "$UPSTREAM_DIR"
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
              if [[ -n "$LATEST_TAG" ]]; then
                VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
                break
              fi
              cd "$GITHUB_WORKSPACE"
            fi
          done
          cd "$GITHUB_WORKSPACE"

          jq -n \
            --arg name "vyges-ip/$IP_NAME" \
            --arg version "$VERSION" \
            --arg license "$LICENSE_SPDX" \
            --arg upstream_repo "$UPSTREAM_REPO" \
            --arg upstream_commit "$UPSTREAM_COMMIT" \
            '{
              name: $name,
              "x-version": $version,
              version: $version,
              license: $license,
              template: "vyges-ip-template@1.0.0",
              target: ["asic", "fpga"],
              design_type: ["digital"],
              maturity: "draft",
              interfaces: [],
              parameters: [],
              _note: "Auto-generated skeleton. Fill in interfaces and parameters from RTL analysis."
            }' > vyges-metadata.json
          echo "Generated vyges-metadata.json skeleton for $IP_NAME"

      - name: Commit and push changes
        if: steps.check.outputs.has_changes == 'true' || steps.initial_check.outputs.needs_initial_sync == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain)" ]]; then
            BRANCH_NAME=$(git branch --show-current || echo "main")
            git add .

            if [[ "${{ steps.initial_check.outputs.needs_initial_sync }}" == "true" ]]; then
              git commit -m "Initial sync from upstream commit ${{ steps.upstream.outputs.commit }}"
            else
              git commit -m "Sync upstream: ${{ steps.check.outputs.current }} -> ${{ steps.check.outputs.latest }}"
            fi

            git push origin "$BRANCH_NAME"
            echo "Changes pushed to $BRANCH_NAME"
          else
            echo "No changes to commit"
          fi

      - name: No changes detected
        if: steps.check.outputs.has_changes == 'false' && steps.initial_check.outputs.needs_initial_sync != 'true'
        run: |
          echo "Upstream is up to date (commit: ${{ steps.check.outputs.current }})"
